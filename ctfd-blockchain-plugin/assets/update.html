{% extends "admin/challenges/update.html" %}

{% block value %}
<div class="form-group">
    <label>Value
        <small class="form-text text-muted">Points awarded when the exploit is verified on-chain.</small>
    </label>
    <input type="number" class="form-control" name="value" value="{{ challenge.value }}" required>
</div>

<hr>
<h6 class="text-muted">Blockchain Settings</h6>

<div class="form-group">
    <label>Vuln ID
        <small class="form-text text-muted">Must be a power of 2.</small>
    </label>
        <select class="form-control" name="vuln_id" required>
        <option value="1" {% if challenge.vuln_id == 1 %}selected{% endif %}>1 - Reentrancy Easy (DAOFactory)</option>
        <option value="2" {% if challenge.vuln_id == 2 %}selected{% endif %}>2 - Reentrancy Hard (DAOFactoryTwo)</option>
        <option value="4" {% if challenge.vuln_id == 4 %}selected{% endif %}>4 - TBD</option>
        <option value="8" {% if challenge.vuln_id == 8 %}selected{% endif %}>8 - TBD</option>
    </select>
</div>

<div class="form-group">
    <label>Proxy Contract Address</label>
    <input type="text" class="form-control" name="proxy_address"
           value="{{ challenge.proxy_address }}" maxlength="42" required>
</div>

<div class="form-group">
    <label>Chain ID</label>
    <input type="number" class="form-control" name="chain_id" value="{{ challenge.chain_id }}" required>
</div>

<div class="form-group">
    <label>RPC URL
        <small class="form-text text-muted">Optional - falls back to BLOCKCHAIN_RPC_URL env var.</small>
    </label>
    <input type="text" class="form-control" name="rpc_url" value="{{ challenge.rpc_url }}">
</div>


<div class="form-group">
    <label>Solidity Source Code</label>
    <textarea class="form-control" name="source_code" rows="12"
              style="font-family:monospace; font-size:12px;">{{ challenge.source_code }}</textarea>
</div>
{% endblock %}
